        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
        }

        .card {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to top, #0a0a0a, transparent);
        }

        .info {
            padding: 24px 24px 8px;
            text-align: center;
            margin-top: -40px;
            position: relative;
            z-index: 1;
        }

        .info h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .info .title {
            font-size: 16px;
            color: #a0a0a0;
            font-weight: 400;
        }

        .info .company {
            font-size: 16px;
            color: #a0a0a0;
            font-weight: 400;
            margin-top: 2px;
        }

        .links {
            list-style: none;
            padding: 16px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .links li a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            transition: background 0.15s ease;
        }

        .links li a:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .links li a:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.08);
        }

        .icon svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .link-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .link-label {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-sub {
            font-size: 13px;
            color: #666;
            margin-top: 1px;
        }

        .save-btn-wrapper {
            padding: 8px 24px 32px;
            margin-top: auto;
        }

        .save-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #0a0a0a;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        .save-btn:active {
            opacity: 0.8;
        }

        @media (min-width: 440px) {
            body {
                padding: 40px 16px;
                align-items: center;
            }

            .card {
                min-height: auto;
                border-radius: 24px;
                overflow: hidden;
                box-shadow: 0 0 80px rgba(0, 0, 0, 0.5);
            }

            .header {
                aspect-ratio: 4 / 3;
            }

            .save-btn-wrapper {
                padding-bottom: 24px;
            }
        }
    </style>

                'END:VCARD'

            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Voic_Andrei.vcf';
            a.click();
            URL.revokeObjectURL(url);
        }
